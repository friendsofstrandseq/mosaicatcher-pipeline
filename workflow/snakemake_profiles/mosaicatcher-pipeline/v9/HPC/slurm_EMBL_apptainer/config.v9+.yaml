# Executor configuration
executor: slurm

# ============================================================
# Multi-User Configuration Overrides
# ============================================================
# Override config values for shared HPC environment
# Users can still override these via command line: --config key=value
config:
  reference_base_dir: "/scratch_cached/korbel/references"

# Default resources: These are the baseline resources allocated to each rule if not overridden by set-resources.
default-resources:
  - mem_mb=500 # Memory in megabytes allocated to each task
  - runtime=600 # Runtime in minutes for each task
  - constraint='' # SLURM constraints (e.g., specific nodes), empty by default

# Resource overrides for specific rules
# NOTE: all rules in the alignment_per_cell group (bwa + samtools_sort +
# mark_duplicates + index_input_bam) share one SLURM submission and must have
# identical string resources. The whole group requires milan nodes because
# sambamba (mark_duplicates) requires AVX2 instructions only on milan nodes.
# Splitting the group is not possible: bam.sort is temp() and gets deleted by
# the downstream job before the upstream group's postprocessing can check it.
set-resources:
  ashleys_bwa_strandseq_to_reference_alignment:
    constraint: "milan"
  ashleys_samtools_sort_bam:
    constraint: "milan"
  ashleys_mark_duplicates:
    constraint: "milan"
  index_input_bam:
    constraint: "milan"

# Throttling to prevent overloading the scheduler
max-status-checks-per-second: 10 # Maximum number of job status checks per second
max-jobs-per-second: 10 # Limit to 10 jobs/sec (10x reduction for scheduler health)

# ============================================================
# Storage Optimization
# ============================================================
# DISABLED: fs provider breaks workflows when data_location is already on /scratch
# The fs provider is designed for: /g/ (slow) → /scratch/ (fast) → /g/ (results)
# If your data is already on /scratch, use default-storage-provider: none
default-storage-provider: none

# Both /g/ and /scratch/ are shared across all compute nodes at EMBL.
# All four categories must be set to avoid Snakemake requiring a storage provider
# (persistence) and to prevent relative-path --bind '.snakemake/storage' from being
# passed to Singularity/Apptainer (sources).
# shared-fs-usage:
#   - persistence
#   - software-deployment
#   - sources
#   - source-cache
# Workaround for Snakemake v9 bug #3958: runtime_paths returns local_storage_prefix as a
# relative Path(".snakemake/storage"), which Apptainer rejects ("destination must be an
# absolute path"). Setting an explicit absolute path here fixes the bind mount.
# Remove once upstream fix is released (https://github.com/snakemake/snakemake/issues/3958)
# local-storage-prefix: /scratch/$USER/mosaicatcher_storage
# remote-job-local-storage-prefix: /scratch/$USER/$JOBID

# Core and job handling
local-cores: 32 # Number of cores to use for local rules
latency-wait: 60 # Time in seconds to wait for filesystems to catch up (important for NFS)
jobs: 150 # Maximum number of concurrent jobs (increased for better throughput)

# Fault tolerance
keep-going: True # Continue with independent jobs even if some jobs fail
rerun-incomplete: True # Rerun jobs that were started but didn't complete
retries: 4 # Retry failed jobs up to 4 times (leverages attempt-based memory scaling)

# Software deployment settings
software-deployment-method:
  - conda # Use Conda for handling software dependencies
  - apptainer # Use Apptainer for handling software dependencies
conda-frontend: "conda" # Specify the frontend for Conda (alternative could be mamba)

# SHARED caches - assemblies/references shared between all group users
# IMPORTANT: Must be group-writable (see setup commands in README.md)
# conda-prefix: Where conda ENVIRONMENTS are installed (on /g/ due to R post-link script issues on /scratch/)
# Package cache location controlled by CONDA_PKGS_DIRS env var (should be /scratch/korbel/shared/conda_pkgs)
conda-prefix: /g/korbel2/shared/conda_envs
apptainer-prefix: /scratch/korbel/shared/apptainer_cache
apptainer-args: "-B /g,/scratch,/scratch_cached,/tmp" # Bind all required paths

# ============================================================
# SLURM Log Management
# ============================================================
# User-specific log directory (write-once, no need for VFS cache)
slurm-logdir: /scratch/$USER/mosaicatcher_logs/slurm
slurm-keep-successful-logs: false # Auto-remove logs for successful jobs (reduce clutter)
slurm-delete-logfiles-older-than: 30 # Delete logs older than 30 days

# ============================================================
# Resource Efficiency Monitoring
# ============================================================
# Generate reports showing actual vs requested resource usage
slurm-efficiency-report: true
slurm-efficiency-report-path: "/scratch/$USER/mosaicatcher_logs/slurm_efficiency_report.txt"
slurm-efficiency-threshold: 0.8 # Flag jobs using <80% of requested resources

# ============================================================
# Customization of Reports
# ============================================================
# Define the path to a custom stylesheet for reports generated by the workflow
report-stylesheet: "workflow/report/custom-stylesheet.css" # Custom stylesheet for enhancing report aesthetics


# ============================================================
# Job Array Grouping Configuration
# ============================================================
# Batch lightweight operations into SLURM job arrays to reduce scheduler overhead
# Direct mapping: rule_group_name=batch_size
# group-components:
#   - symlink_operations=10 # Symlinks: 10 CPUs, ~1min runtime
#   - compression_indexing_operations=15 # Compression/indexing: 15 CPUs
#   - qc_statistics_operations=20 # QC stats: 20 CPUs
#   - text_processing_operations=15 # Text processing: 15 CPUs
